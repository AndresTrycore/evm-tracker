services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: evm_user
      POSTGRES_PASSWORD: evm_pass
      POSTGRES_DB: evm_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    env_file:
      - ./backend/.env.example
    depends_on:
      - db
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data: