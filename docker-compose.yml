version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: evm_db
    environment:
      POSTGRES_USER: evm_user
      POSTGRES_PASSWORD: evm_password
      POSTGRES_DB: evm_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evm_user -d evm_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evm_api
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql://evm_user:evm_password@db:5432/evm_db
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    working_dir: /app/backend

    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload


volumes:
  postgres_data: